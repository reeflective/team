# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Build (default / go_sqlite)
      run: go build -v ./...

    - name: Build teamserver example (wasm_sqlite)
      working-directory: example/teamserver
      run: go build -v -tags wasm_sqlite .

    - name: Build teamserver example (cgo_sqlite)
      working-directory: example/teamserver
      run: go build -v -tags cgo_sqlite .

    - name: Run coverage (go_sqlite)
      run: go test -tags go_sqlite -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Build (default / go_sqlite)
      run: go build -v ./...

    - name: Build teamserver example (wasm_sqlite)
      working-directory: example/teamserver
      run: go build -v -tags wasm_sqlite .

    - name: Run coverage
      run: go test -v ./...
